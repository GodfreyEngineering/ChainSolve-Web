name: Bug Report
description: Report a bug in ChainSolve Web
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or exports
      description: If applicable, add screenshots or attach a `.chainsolvejson` export.
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 130, Firefox 128, Safari 18
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ChainSolve version
      description: Found in Help > About
      placeholder: e.g. Phase L
    validations:
      required: false
