# ============================================================
# backup.yml — Daily Supabase database backup trigger.
#
# Runs at 03:00 UTC daily via cron. Calls the Supabase Management
# API to trigger a point-in-time backup of the project database.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token (Management API)
#   SUPABASE_PROJECT_REF   — Project ref (e.g. "abcdefghijklmnop")
#
# Can also be triggered manually via workflow_dispatch.
# ============================================================

name: Daily Supabase backup

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {} # Manual trigger

jobs:
  backup:
    name: Trigger Supabase backup
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger backup via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Triggering backup for project: $SUPABASE_PROJECT_REF"

          HTTP_STATUS=$(curl -s -o /tmp/backup_response.json -w "%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/backups" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/backup_response.json

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Backup triggered successfully"
          elif [ "$HTTP_STATUS" -eq 422 ]; then
            echo "⚠️ Backup already in progress or recently completed (422) — this is OK"
          else
            echo "❌ Backup trigger failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: List recent backups
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Recent backups:"
          curl -s \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/backups" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            | python3 -m json.tool || true
