name: API Docs

# Generates and publishes API documentation to GitHub Pages.
#
# Two doc sets are produced:
#   1. Rust API docs  — cargo doc --workspace --no-deps (HTML via rustdoc)
#   2. JS/TS SDK docs — TypeDoc from src/lib/ and src/engine/ entry points
#
# Both are assembled into a single GitHub Pages site:
#   /                 → docs/api/index.html  (landing page)
#   /rust/            → rustdoc output
#   /js/              → TypeDoc output
#
# Deployment target: GitHub Pages (docs branch gh-pages).
# Custom domain:     docs.chainsolve.dev  (set via CNAME in the Pages settings)

on:
  push:
    branches: [main]
    paths:
      # Only regenerate when source changes that affect docs
      - 'crates/**/*.rs'
      - 'src/lib/**/*.ts'
      - 'src/engine/**/*.ts'
      - 'src/blocks/**/*.ts'
      - 'typedoc.json'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:  # Allow manual re-generation

permissions:
  contents: read
  pages: write
  id-token: write

# Only one docs deployment at a time
concurrency:
  group: docs-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Job 1: Generate Rust API docs ──────────────────────────────────────────
  rust-docs:
    name: Rust API docs (cargo doc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate Rust docs
        # Use explicit features to avoid enabling native-cuda (requires CUDA toolkit).
        run: |
          cargo doc \
            --workspace \
            --no-deps \
            --features engine-core/high-precision,engine-core/faer,engine-core/parallel \
            --exclude chainsolve-desktop
        env:
          # Rustdoc uses RUSTDOCFLAGS for extra flags
          RUSTDOCFLAGS: >-
            --cfg docsrs
            --html-in-header crates/engine-core/docs/katex-header.html
            -D warnings

      - name: Add redirect index for /rust/
        run: |
          # Create a root index.html that redirects to engine_core
          cat > target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=engine_core/index.html">
            <title>ChainSolve Rust API</title>
          </head>
          <body>
            <p>Redirecting to <a href="engine_core/index.html">engine_core docs</a>…</p>
          </body>
          </html>
          EOF

      - name: Upload Rust docs artifact
        uses: actions/upload-artifact@v5
        with:
          name: rust-docs
          path: target/doc/
          retention-days: 1

  # ── Job 2: Generate JS/TS SDK docs ─────────────────────────────────────────
  js-docs:
    name: JS/TS SDK docs (TypeDoc)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install WASM type stubs (needed for TypeDoc to resolve engine types)
        # The WASM package generates TypeScript bindings that some src/engine files import.
        # We provide a minimal stub so TypeDoc can resolve these imports without building WASM.
        run: |
          mkdir -p crates/engine-wasm/pkg
          # Minimal type stub — just enough for TypeDoc to resolve imports
          cat > crates/engine-wasm/pkg/engine_wasm.d.ts << 'EOF'
          /** Stub types for TypeDoc — real types generated by wasm-pack */
          export interface WasmEvalResult { values: Record<string, unknown>; diagnostics: unknown[]; elapsed_us: number; trace: unknown[]; partial: boolean; }
          export class EngineGraph { free(): void; }
          export function run(snapshot_json: string): WasmEvalResult;
          export function run_load_snapshot(graph: EngineGraph, snapshot_json: string): WasmEvalResult;
          export function run_patch(graph: EngineGraph, patch_json: string): WasmEvalResult;
          export function run_validate(graph: EngineGraph): unknown[];
          export default function init(input?: RequestInfo | URL): Promise<void>;
          EOF
          echo '{"name":"engine-wasm","version":"0.1.0","main":"engine_wasm.js","types":"engine_wasm.d.ts"}' > crates/engine-wasm/pkg/package.json

      - name: Generate TypeDoc
        run: npx typedoc --options typedoc.json
        # TypeDoc will exit 0 on warnings by default; we treat them as non-fatal

      - name: Upload JS docs artifact
        uses: actions/upload-artifact@v5
        with:
          name: js-docs
          path: docs/api/js/
          retention-days: 1

  # ── Job 3: Assemble + deploy to GitHub Pages ───────────────────────────────
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [rust-docs, js-docs]

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Download Rust docs
        uses: actions/download-artifact@v5
        with:
          name: rust-docs
          path: _site/rust/

      - name: Download JS docs
        uses: actions/download-artifact@v5
        with:
          name: js-docs
          path: _site/js/

      - name: Create landing page
        run: |
          mkdir -p _site
          cp docs/api/index.html _site/index.html 2>/dev/null || cat > _site/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ChainSolve API Documentation</title>
            <style>
              :root { --accent: #1CABB0; --bg: #1a1a1a; --card: #2a2a2a; --text: #F4F4F3; }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 2rem; }
              h1 { color: var(--accent); font-size: 2rem; }
              p { color: #aaa; max-width: 500px; text-align: center; }
              .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
              .card { background: var(--card); border-radius: 12px; padding: 1.5rem 2rem; min-width: 200px; text-align: center; text-decoration: none; color: var(--text); border: 1px solid #333; transition: border-color 0.2s; }
              .card:hover { border-color: var(--accent); }
              .card h2 { color: var(--accent); margin-bottom: 0.5rem; }
              .card p { color: #aaa; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>ChainSolve API Documentation</h1>
            <p>Auto-generated from source code. Updated on every push to main.</p>
            <div class="cards">
              <a class="card" href="rust/engine_core/index.html">
                <h2>Rust API</h2>
                <p>engine-core, chainsolve-block-sdk — full crate documentation</p>
              </a>
              <a class="card" href="js/index.html">
                <h2>JS/TS SDK</h2>
                <p>Engine bridge, service layer, plugin system, algorithm docs</p>
              </a>
            </div>
          </body>
          </html>
          INDEXEOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
