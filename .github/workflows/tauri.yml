name: Desktop Build (Tauri)

# Builds the ChainSolve desktop app for Windows, macOS (universal), and Linux.
# Produces signed installers and publishes a GitHub Release on tag push.
#
# Triggers:
#   - Tag push matching v* (e.g. v0.1.0)  → full build + GitHub Release
#   - Manual dispatch                       → build only (no release)
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY         — ed25519 private key for Tauri updater
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the private key
#   APPLE_CERTIFICATE                 — base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD        — .p12 password
#   APPLE_SIGNING_IDENTITY            — "Developer ID Application: ..."
#   APPLE_ID                          — Apple ID for notarisation
#   APPLE_PASSWORD                    — App-specific password for notarisation
#   APPLE_TEAM_ID                     — Apple Developer Team ID
#   VITE_SUPABASE_URL                 — for production Vite build
#   VITE_SUPABASE_ANON_KEY            — for production Vite build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Build for each platform ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-targets: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            rust-targets: x86_64-pc-windows-msvc
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    name: Desktop build — ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      # ── Linux: install WebKit deps ─────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-directories: "src-tauri"

      # ── Node.js ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Install wasm-pack and build WASM (needed for Vite build) ──────────
      - name: Install wasm-pack
        run: |
          curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
        if: matrix.platform == 'ubuntu-22.04'

      - name: Install wasm-pack (macOS)
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
        if: matrix.platform == 'macos-latest'

      - name: Install wasm-pack (Windows)
        run: cargo install wasm-pack --version 0.14.0
        if: matrix.platform == 'windows-latest'

      - name: Build WASM
        run: wasm-pack build crates/engine-wasm --target web --release

      # ── macOS: import signing certificate ────────────────────────────────
      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest' && github.event_name == 'push'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      # ── Build Tauri app ───────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          projectPath: .
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: ChainSolve ${{ github.ref_name }}
          releaseBody: |
            ## ChainSolve Desktop ${{ github.ref_name }}

            ### Downloads
            | Platform | Installer |
            |---|---|
            | Windows | `.msi` |
            | macOS | `.dmg` (universal: Intel + Apple Silicon) |
            | Linux | `.AppImage`, `.deb`, `.rpm` |

            ### What's new
            See [CHANGELOG](https://github.com/godfrey-engineering/chainsolve/blob/main/CHANGELOG.md).

            ### Auto-updates
            The app checks for updates automatically. You can also trigger a check via **Help → Check for Updates**.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

      # ── Upload build artifacts ────────────────────────────────────────────
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
          retention-days: 30
          if-no-files-found: ignore
