<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="index, follow" />
    <meta name="description" content="ChainSolve — scientific node-graph calculator. Build computation chains visually." />
    <meta name="theme-color" content="#1CABB0" />
    <link rel="canonical" href="https://app.chainsolve.co.uk/" />
    <!-- Hreflang: international locale signals -->
    <link rel="alternate" hreflang="en" href="https://app.chainsolve.co.uk/?lang=en" />
    <link rel="alternate" hreflang="es" href="https://app.chainsolve.co.uk/?lang=es" />
    <link rel="alternate" hreflang="fr" href="https://app.chainsolve.co.uk/?lang=fr" />

    <link rel="alternate" hreflang="de" href="https://app.chainsolve.co.uk/?lang=de" />
    <link rel="alternate" hreflang="he" href="https://app.chainsolve.co.uk/?lang=he" />
    <link rel="alternate" hreflang="x-default" href="https://app.chainsolve.co.uk/" />
    <!-- Open Graph -->
    <meta property="og:title" content="ChainSolve" />
    <meta property="og:description" content="Scientific node-graph calculator. Build computation chains visually." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.chainsolve.co.uk/" />

    <meta property="og:locale:alternate" content="es_ES" />

    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="he_IL" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Scientific node-graph calculator. Build computation chains visually." />
    <meta name="twitter:image" content="https://app.chainsolve.co.uk/og-image.png" />
    <!-- Boot ladder rung 1: HTML parsed by browser (no JS required).
         e2e tests check for this sentinel to distinguish a network/server
         failure from a JS/React/WASM failure. -->
    <meta name="x-boot" data-testid="boot-html" content="loaded" />
    <title>ChainSolve</title>
  </head>
  <body>
    <div id="root">
      <main>
        <!-- J4-1: Pre-React loading screen (removed when React mounts) -->
        <div id="cs-preloader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0f0f">
          <img src="/brand/logo-wide-text.png" alt="ChainSolve loading" width="120" height="30" style="opacity:0.4">
        </div>
      </main>
    </div>
    <script type="module" src="/src/boot.ts"></script>
  </body>
</html>
