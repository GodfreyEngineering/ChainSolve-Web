{{- if .Values.frontend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chainsolve.fullname" . }}-frontend
  labels:
    {{- include "chainsolve.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chainsolve.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}

{{- if .Values.engine.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chainsolve.fullname" . }}-engine
  labels:
    {{- include "chainsolve.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  type: {{ .Values.engine.service.type }}
  ports:
    - port: {{ .Values.engine.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chainsolve.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: engine
{{- end }}

{{- if .Values.gpuEngine.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chainsolve.fullname" . }}-engine-gpu
  labels:
    {{- include "chainsolve.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine-gpu
spec:
  type: {{ .Values.gpuEngine.service.type }}
  ports:
    - port: {{ .Values.gpuEngine.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chainsolve.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: engine-gpu
{{- end }}
