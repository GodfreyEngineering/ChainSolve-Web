{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chainsolve.fullname" . }}
  labels:
    {{- include "chainsolve.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chainsolve.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow traffic between chainsolve pods
    {{- range .Values.networkPolicy.ingressFrom }}
    - from:
        - {{ toYaml . | nindent 10 | trim }}
    {{- end }}
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS (Supabase cloud, Stripe, etc.)
    - ports:
        - port: 443
          protocol: TCP
    # Allow internal cluster communication
    - to:
        - podSelector:
            matchLabels:
              {{- include "chainsolve.selectorLabels" . | nindent 14 }}
{{- end }}
