[package]
name = "engine-core"
version = "0.1.0"
edition = "2021"

[features]
default = []
high-precision = ["dashu-float"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dashu-float = { version = "0.4", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"

[[bench]]
name = "engine_benchmarks"
harness = false
